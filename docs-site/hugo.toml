title = "MCP Toolbox Go API"

[params]
  offlineSearch = true
  copyright = "Google LLC"

# Hand-edited version lists, one per package. Newest first — the order is
# mirrored into the dropdown. Add a block before tagging a release, and only
# list versions whose /<pkg>/<version>/ docs already exist (or will after the
# backfill run), or the dropdown link 404s. URLs are root-relative so they
# resolve against whatever host serves the page (production or staging).
[params.versions]
  [[params.versions.core]]
    version = "dev"
    url = "/core/dev/"
  [[params.versions.core]]
    version = "v1.0.0"
    url = "/core/v1.0.0/"
  [[params.versions.core]]
    version = "v0.7.0"
    url = "/core/v0.7.0/"
  [[params.versions.core]]
    version = "v0.6.2"
    url = "/core/v0.6.2/"
  [[params.versions.tbadk]]
    version = "dev"
    url = "/tbadk/dev/"
  [[params.versions.tbadk]]
    version = "v0.8.0"
    url = "/tbadk/v0.8.0/"
  [[params.versions.tbadk]]
    version = "v0.7.0"
    url = "/tbadk/v0.7.0/"
  [[params.versions.tbadk]]
    version = "v0.6.0"
    url = "/tbadk/v0.6.0/"
  [[params.versions.tbgenkit]]
    version = "dev"
    url = "/tbgenkit/dev/"
  [[params.versions.tbgenkit]]
    version = "v0.8.0"
    url = "/tbgenkit/v0.8.0/"
  [[params.versions.tbgenkit]]
    version = "v0.7.0"
    url = "/tbgenkit/v0.7.0/"
  [[params.versions.tbgenkit]]
    version = "v0.6.0"
    url = "/tbgenkit/v0.6.0/"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false
  style = "tango"

[params.ui]
  navbar_logo = true
  sidebar_menu_foldable = true
  ul_show = 2
  breadcrumb_disable = true
  sidebar_menu_compact = false
  showLightDarkModeMenu = true

[[menu.main]]
  name = "Documentation"
  url = "https://mcp-toolbox.dev"
  weight = 10

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/googleapis/mcp-toolbox"
  weight = 20
  pre = "<i class='fab fa-github'></i>"

[outputFormats]
  # Dropdown fragment, fetched at runtime by the navbar version selector so
  # frozen old version pages show newly-added versions without a rebuild.
  [outputFormats.releases]
    baseName = "releases"
    isPlainText = true
    mediaType = "text/releases"
  # Per-package "latest" redirect, hoisted to /<pkg>/latest/index.html.
  [outputFormats.latest]
    baseName = "latest"
    mediaType = "text/html"
    isHTML = true

[mediaTypes."text/releases"]
  suffixes = ["releases"]

[outputs]
  home = ["HTML", "JSON", "releases", "latest"]   # JSON kept for offline search

[module]
  [[module.imports]]
    path = "github.com/google/docsy"
